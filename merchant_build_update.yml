- name: 部署 merchant_run
  hosts: "{{ target_hosts }}"
  gather_facts: no
  become: no

  vars:
    deploy_dir: /home/admin/merchant_run
    pkg_backup_dir: /home/admin/merchant_run/package_backup
    keep_pkg: 5

  tasks:

    - name: 输出部署信息
      debug:
        msg:
          - "开始部署到 {{ inventory_hostname }}"
          - "部署目录: {{ deploy_dir }}"

    - name: 创建部署目录
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: 创建包备份目录
      file:
        path: "{{ pkg_backup_dir }}"
        state: directory
        mode: '0755'

    # ✅ 先把旧包移动到备份目录
    - name: 备份旧的构建包
      shell: |
        shopt -s nullglob
        for f in {{ deploy_dir }}/merchant_*.tar*; do
          mv "$f" {{ pkg_backup_dir }}/
        done
      args:
        executable: /bin/bash

    # ✅ 只保留最新5个备份包
    - name: 清理旧的包备份（最多保留5个）
      shell: |
        ls -1t {{ pkg_backup_dir }}/merchant_*.tar* 2>/dev/null | tail -n +{{ keep_pkg + 1 }} | xargs -r rm -f
      args:
        executable: /bin/bash

    - name: 上传新包到目标服务器
      copy:
        src: "/tmp/{{ hostvars['build-machine']['build_package'] }}"
        dest: "{{ deploy_dir }}/{{ hostvars['build-machine']['build_package'] }}"
        mode: '0644'

    - name: 解压包到部署目录
      unarchive:
        src: "{{ deploy_dir }}/{{ hostvars['build-machine']['build_package'] }}"
        dest: "{{ deploy_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=0]

    - name: 输出解压信息
      debug:
        msg: "包已解压到 {{ deploy_dir }}"

    - name: 确保 update.sh 可执行
      file:
        path: "{{ deploy_dir }}/update.sh"
        mode: '0755'

    - name: 执行 update.sh
      shell: bash update.sh
      args:
        chdir: "{{ deploy_dir }}"
      register: update_result
      ignore_errors: yes

    - name: 打印 update.sh 输出
      debug:
        msg: "{{ update_result.stdout_lines }}"
      run_once: true

    - name: 输出部署完成信息
      debug:
        msg: "部署完成到 {{ inventory_hostname }} ，包名: {{ hostvars['build-machine']['build_package'] }}"