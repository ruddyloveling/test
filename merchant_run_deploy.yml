---
- name: 从构建机获取包
  hosts: build-machine
  become: no

  vars:
    package_dir: /home/admin/package/merchant

  tasks:

    - name: 校验参数
      fail:
        msg: "必须传入 package_name"
      when: package_name is not defined or package_name | length == 0

    - name: 检查构建机包是否存在
      stat:
        path: "{{ package_dir }}/{{ package_name }}"
      register: pkg_stat

    - name: 包不存在则失败
      fail:
        msg: "构建机上不存在包: {{ package_name }}"
      when: not pkg_stat.stat.exists

    - name: 拉取包到 AWX 控制端
      fetch:
        src: "{{ package_dir }}/{{ package_name }}"
        dest: "/tmp/{{ package_name }}"
        flat: yes

    - name: 输出拉取信息
      debug:
        msg:
          - "包已拉取到 AWX 控制端"
          - "包名: {{ package_name }}"
          - "临时路径: /tmp/{{ package_name }}"



- name: 部署 merchant_run
  hosts: "{{ target_hosts }}"   # 从 AWX Survey 传入的主机列表
  become: no

  vars:
    deploy_dir: /home/admin/merchant_run
    backup_dir: /home/admin/merchant_run_backup
    package_tmp: "/tmp/{{ package_name }}"
    package_dir: /home/admin/package/merchant

  tasks:

    - name: 校验 package_name 参数
      fail:
        msg: "必须传入 package_name"
      when: package_name is not defined or package_name | length == 0

    - name: 输出部署信息
      debug:
        msg:
          - "开始部署到 {{ inventory_hostname }}"
          - "包名: {{ package_name }}"
          - "部署目录: {{ deploy_dir }}"
          - "备份目录: {{ backup_dir }}"

    - name: 创建部署和备份目录
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ deploy_dir }}"
        - "{{ backup_dir }}"

    - name: 拉取包到 AWX 控制端（从构建机获取）
      fetch:
        src: "{{ package_dir }}/{{ package_name }}"
        dest: "/tmp/{{ package_name }}"
        flat: yes
      delegate_to: build-machine
      run_once: true   # 只拉一次

    - name: 输出拉取信息
      debug:
        msg:
          - "包已拉取到 AWX 控制端"
          - "包名: {{ package_name }}"
          - "临时路径: /tmp/{{ package_name }}"
      run_once: true

    - name: 上传新包到目标服务器
      copy:
        src: "{{ package_tmp }}"
        dest: "{{ deploy_dir }}/{{ package_name }}"
        mode: '0644'

    - name: 备份旧版本
      shell: |
        if [ -d {{ deploy_dir }} ]; then
          cp -r {{ deploy_dir }} {{ backup_dir }}/merchant_{{ ansible_date_time.iso8601_basic_short }}
        fi
      args:
        executable: /bin/bash

    - name: 输出备份信息
      debug:
        msg: "旧版本已备份到 {{ backup_dir }}/merchant_{{ ansible_date_time.iso8601_basic_short }}"

    - name: 解压包到部署目录
      unarchive:
        src: "{{ deploy_dir }}/{{ package_name }}"
        dest: "{{ deploy_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=0]

    - name: 输出解压信息
      debug:
        msg: "包已解压到 {{ deploy_dir }}"

    - name: 确保 update.sh 可执行
      file:
        path: "{{ deploy_dir }}/update.sh"
        mode: '0755'

    - name: 执行 update.sh（普通用户权限）
      shell: bash update.sh
      args:
        chdir: "{{ deploy_dir }}"
      register: update_result
      ignore_errors: yes

    - name: 输出 update.sh 执行结果
      debug:
        msg:
          - "update.sh 执行状态: {{ update_result.rc | default('未执行') }}"
          - "标准输出: {{ update_result.stdout_lines | default([]) }}"
          - "标准错误: {{ update_result.stderr_lines | default([]) }}"

    - name: 输出部署完成信息
      debug:
        msg: "部署完成到 {{ inventory_hostname }} ，版本: {{ package_name }}"