---
- name: 从构建机获取包
  hosts: build-machine
  become: no

  vars:
    package_dir: /home/admin/package/merchant

  tasks:

    - name: 校验参数
      fail:
        msg: "必须传入 package_name"
      when: package_name is not defined or package_name | length == 0

    - name: 检查构建机包是否存在
      stat:
        path: "{{ package_dir }}/{{ package_name }}"
      register: pkg_stat

    - name: 包不存在则失败
      fail:
        msg: "构建机上不存在包: {{ package_name }}"
      when: not pkg_stat.stat.exists

    - name: 拉取包到 AWX 控制端
      fetch:
        src: "{{ package_dir }}/{{ package_name }}"
        dest: "/tmp/{{ package_name }}"
        flat: yes

    - name: 输出拉取信息
      debug:
        msg:
          - "包已拉取到 AWX 控制端"
          - "包名: {{ package_name }}"
          - "临时路径: /tmp/{{ package_name }}"


- name: 部署到目标服务器
  hosts: test_merchant-154.205.11.118
  become: no

  vars:
    deploy_dir: /home/admin/merchant_run
    package_tmp: "/tmp/{{ package_name }}"

  tasks:

    - name: 输出部署信息
      debug:
        msg:
          - "开始部署到 {{ inventory_hostname }}"
          - "包名: {{ package_name }}"
          - "部署目录: {{ deploy_dir }}"

    - name: 创建部署目录
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: 上传新包
      copy:
        src: "{{ package_tmp }}"
        dest: "{{ deploy_dir }}/{{ package_name }}"
        mode: '0644'

    - name: 解压包到部署目录
      unarchive:
        src: "{{ deploy_dir }}/{{ package_name }}"
        dest: "{{ deploy_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=0]

    - name: 输出解压信息
      debug:
        msg: "包已解压到 {{ deploy_dir }}"

    - name: 确保 update.sh 可执行
      file:
        path: "{{ deploy_dir }}/update.sh"
        mode: '0755'

    - name: 执行 update.sh
      shell: "{{ deploy_dir }}/update.sh"
      args:
        chdir: "{{ deploy_dir }}"
      become: yes
      register: update_result
      ignore_errors: yes   # 防止 playbook 直接失败，可以查看输出

    - name: 输出 update.sh 执行结果
      debug:
        msg:
          - "update.sh 执行状态: {{ update_result.rc }}"
          - "标准输出: {{ update_result.stdout_lines }}"
          - "标准错误: {{ update_result.stderr_lines }}"

    - name: 输出部署完成信息
      debug:
        msg: "部署完成到 {{ inventory_hostname }} ，版本: {{ package_name }}"