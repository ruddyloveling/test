---
- name: 构建并获取 gateway 包
  hosts: build-machine
  gather_facts: no
  become: no

  vars:
    branch: main   # 可在 AWX Survey 中传入

  tasks:
    - name: 构建 gateway 并记录输出
      shell: bash /home/admin/build/gateway_build.sh {{ branch }}
      register: build_result
      run_once: true

    - name: 打印 gateway_build.sh 输出
      debug:
        msg: "{{ build_result.stdout_lines }}"
      run_once: true

    - name: 提取生成的包名
      set_fact:
        build_package: "{{ (build_result.stdout | regex_search('BUILD_PACKAGE=(.*)', '\\1'))[0] }}"
      run_once: true

    - name: 显示生成的包
      debug:
        msg: "本次构建生成包: {{ build_package }}"
      run_once: true

    - name: 检查构建机包是否存在
      stat:
        path: "/home/admin/package/gateway/{{ build_package }}"
      register: pkg_stat
      run_once: true

    - name: 构建失败或包不存在则终止
      fail:
        msg: "构建机上未生成包: {{ build_package }}"
      when: not pkg_stat.stat.exists
      run_once: true

    - name: 拉取包到 AWX 控制端（只拉一次）
      fetch:
        src: "/home/admin/package/gateway/{{ build_package }}"
        dest: "/tmp/{{ build_package }}"
        flat: yes
      run_once: true

- name: 部署 gateway
  hosts: "{{ target_hosts }}"
  gather_facts: no
  become: no

  vars:
    deploy_dir: /home/admin/gateway

  tasks:

    - name: 输出部署信息
      debug:
        msg:
          - "开始部署到 {{ inventory_hostname }}"
          - "部署目录: {{ deploy_dir }}"

    - name: 创建部署目录
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: 上传新包到目标服务器
      copy:
        src: "/tmp/{{ hostvars['build-machine']['build_package'] }}"
        dest: "{{ deploy_dir }}/{{ hostvars['build-machine']['build_package'] }}"
        mode: '0644'

    - name: 创建 package_backup 目录
      file:
        path: "{{ deploy_dir }}/package_backup"
        state: directory
    - name: 备份旧包（如果存在）
      shell: |
        if ls {{ deploy_dir }}/gateway_*.tar* 1> /dev/null 2>&1; then
          mv {{ deploy_dir }}/gateway_*.tar* {{ deploy_dir }}/package_backup/
        fi
      ignore_errors: yes

    - name: 清理旧备份（最多保留5个）
      shell: |
        cd {{ deploy_dir }}/package_backup
        ls -1t | tail -n +6 | xargs -r rm -f
      ignore_errors: yes
    - name: 解压包到部署目录
      unarchive:
        src: "{{ deploy_dir }}/{{ hostvars['build-machine']['build_package'] }}"
        dest: "{{ deploy_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=0]

    - name: 输出解压信息
      debug:
        msg: "包已解压到 {{ deploy_dir }}"

    - name: 确保 update.sh 可执行
      file:
        path: "{{ deploy_dir }}/gateway_update.sh"
        mode: '0755'

    - name: 执行 update.sh（普通用户权限）
      shell: bash update.sh
      args:
        chdir: "{{ deploy_dir }}"
      register: update_result
      ignore_errors: yes
    - name: 打印 update.sh 输出
      debug:
        msg: "{{ update_result.stdout_lines }}"
      run_once: true


    - name: 输出部署完成信息
      debug:
        msg: "部署完成到 {{ inventory_hostname }} ，包名: {{ hostvars['build-machine']['build_package'] }}"